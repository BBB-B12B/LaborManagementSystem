name: Build and Deploy to Firebase

on:
  push:
    branches:
      - main # หรือปรับเป็น branch หลักที่คุณใช้งาน (เช่น master, develop)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. ติดตั้ง Dependencies และ Build ส่วนของ Cloud Functions (Backend)
      - name: Install and Build Functions
        run: |
          npm --prefix functions install
          npm --prefix functions run build

      # 2. ติดตั้ง Dependencies สำหรับ Frontend (Next.js)
      # เพื่อให้ Firebase Web Frameworks สามารถนำไป build และ deploy ต่อได้
      - name: Install Frontend Dependencies
        run: |
          npm --prefix frontend install --legacy-peer-deps

      # เพิ่ม next binary เข้า PATH เพื่อให้ firebase-tools หา next ได้ตอน deploy
      - name: Add frontend bin to PATH
        run: echo "${{ github.workspace }}/frontend/node_modules/.bin" >> $GITHUB_PATH

      # 3. สั่ง Deploy ทุกอย่างไปยัง Firebase (Hosting, Functions, Rules)
      - name: Deploy to Firebase
        run: |
          npx firebase-tools experiments:enable webframeworks
          npx firebase-tools deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
