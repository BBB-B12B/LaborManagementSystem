name: Build and Deploy to Firebase

on:
  push:
    branches:
      - main # หรือปรับเป็น branch หลักที่คุณใช้งาน (เช่น master, develop)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. ติดตั้ง Dependencies และ Build ส่วนของ Cloud Functions (Backend)
      - name: Install and Build Functions
        run: |
          npm --prefix functions ci
          npm --prefix functions run build

      # 2. ติดตั้ง Dependencies สำหรับ Frontend (Next.js)
      # เพื่อให้ Firebase Web Frameworks สามารถนำไป build และ deploy ต่อได้
      - name: Install Frontend Dependencies
        run: |
          npm --prefix frontend install --legacy-peer-deps

      # 3. สั่ง Deploy ทุกอย่างไปยัง Firebase (Hosting, Functions, Rules)
      - name: Deploy to Firebase
        uses: w9jds/firebase-action@v2.2.0
        with:
          args: deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
