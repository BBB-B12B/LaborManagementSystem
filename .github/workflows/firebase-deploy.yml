name: Build and Deploy to Firebase

on:
  push:
    branches:
      - main # หรือปรับเป็น branch หลักที่คุณใช้งาน (เช่น master, develop)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ติดตั้ง firebase-tools แบบ global เพื่อหลีกเลี่ยงปัญหา npx path resolution
      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      # 1. ติดตั้ง Dependencies และ Build ส่วนของ Cloud Functions (Backend)
      - name: Install and Build Functions
        run: |
          npm --prefix functions install
          npm --prefix functions run build

      # 2. ติดตั้ง Dependencies สำหรับ Frontend (Next.js)
      - name: Install Frontend Dependencies
        run: npm --prefix frontend install --legacy-peer-deps

      # 3. สร้าง symlink ให้ firebase-tools หา next ได้
      # root package.json มี workspaces: ["backend", "frontend"] ทำให้ npm hoist
      # package `next` ไปที่ root/node_modules แทน frontend/node_modules
      # firebase-tools ต้องการ next ที่ frontend/node_modules/.bin/next
      - name: Expose next binary for firebase-tools
        run: |
          mkdir -p frontend/node_modules/.bin
          if [ -f "frontend/node_modules/.bin/next" ]; then
            echo "next already exists in frontend/node_modules/.bin"
          elif [ -f "node_modules/.bin/next" ]; then
            ln -sf "$(realpath node_modules/.bin/next)" frontend/node_modules/.bin/next
            echo "Linked next from root to frontend/node_modules/.bin"
          else
            echo "ERROR: next binary not found in root or frontend node_modules" && exit 1
          fi

      # 4. สั่ง Deploy ทุกอย่างไปยัง Firebase (Hosting, Functions, Rules)
      - name: Deploy to Firebase
        run: |
          firebase experiments:enable webframeworks
          firebase deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
