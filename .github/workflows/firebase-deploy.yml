name: Build and Deploy to Firebase

on:
  push:
    branches:
      - main # หรือปรับเป็น branch หลักที่คุณใช้งาน (เช่น master, develop)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. ติดตั้ง Dependencies และ Build ส่วนของ Cloud Functions (Backend)
      - name: Install and Build Functions
        run: |
          npm --prefix functions install
          npm --prefix functions run build

      # 2. ติดตั้ง Dependencies และ Build Frontend (Next.js static export → frontend/out/)
      - name: Install and Build Frontend
        run: |
          npm --prefix frontend install --legacy-peer-deps
          npm --prefix frontend run build

      # 3. Deploy ไปยัง Firebase (Hosting จาก frontend/out/, Functions, Rules)
      - name: Deploy to Firebase
        run: npx firebase-tools deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
